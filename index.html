<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qalan Ultra Style - Bright Background</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            /* ФОНДЫ ЖАРҚЫНЫРАҚ ЖӘНЕ АНЫҚ ЕТТІК */
            background: 
                linear-gradient(rgba(255, 255, 255, 0.4), rgba(224, 242, 254, 0.4)), 
                url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            backdrop-filter: saturate(1.5) brightness(1.1); /* Суреттің түстерін ашады */
        }
        .main-card {
            background: rgba(255, 255, 255, 0.92); /* Карточка сәл мөлдір, фон көрініп тұрады */
            backdrop-filter: blur(12px);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
        }
        .preview-overlay {
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(186,230,253,0.9) 100%);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        .character-box {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .btn-primary {
            background: #22C55E;
            box-shadow: 0 6px 0 #16A34A;
            transition: all 0.1s ease;
        }
        .btn-primary:active {
            box-shadow: 0 0 0 #16A34A;
            transform: translateY(6px);
        }
        .code-area {
            background: #0F172A; /* Қанық қара-көк түс */
            color: #38BDF8;
            border-radius: 20px;
            font-family: 'Fira Code', 'Courier New', monospace;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 relative overflow-x-hidden pt-20">

    <div id="previewScreen" class="fixed inset-0 preview-overlay flex items-center justify-center p-6 transition-all duration-700">
        <div class="max-w-md w-full text-center bg-white/95 p-10 rounded-[45px] shadow-2xl border-4 border-white">
            <div class="mb-6">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Lucky&backgroundColor=b6e3f4" class="w-32 h-32 mx-auto animate-bounce drop-shadow-xl">
            </div>
            <h1 class="text-4xl font-black text-gray-800 mb-4 tracking-tight">IT Әлеміне жол!</h1>
            <p class="text-gray-600 mb-8 font-bold leading-relaxed italic">
                Фондағы кодқа қарап шабыт ал да, өз бағдарламаңды жазуды баста! 🚀
            </p>
            <button onclick="startLesson()" class="btn-primary w-full text-white text-2xl font-black py-5 rounded-2xl tracking-widest uppercase shadow-xl">
                БАСТАЙМЫЗ
            </button>
        </div>
    </div>

    <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-full max-w-sm">
        <div class="bg-white/90 backdrop-blur-md px-6 py-2 rounded-full shadow-lg text-center border-2 border-blue-400/30">
            <span class="text-xs font-black text-blue-600 uppercase tracking-widest italic">Qalan Coding Mode</span>
        </div>
    </div>

    <div class="w-full max-w-2xl flex justify-between items-center mb-6 mt-6">
        <div class="flex items-center space-x-2 bg-white/90 px-4 py-2 rounded-full shadow-lg border border-white">
            <span class="text-xl">⭐</span>
            <span id="score" class="font-black text-gray-700">0 упай</span>
        </div>
        <div class="flex-1 mx-6">
            <div class="h-5 bg-white/40 rounded-full overflow-hidden shadow-inner border border-white/50">
                <div id="progBar" class="h-full bg-gradient-to-r from-blue-500 via-cyan-400 to-blue-600 w-0 transition-all duration-700 shadow-lg"></div>
            </div>
        </div>
        <div id="levelTag" class="bg-blue-600 text-white px-5 py-1 rounded-full font-black shadow-lg text-sm border-2 border-white/20">1-деңгей</div>
    </div>

    <div class="character-box mb-6">
        <div class="bg-white/95 p-5 rounded-3xl shadow-2xl relative border-2 border-blue-100 max-w-[300px] mx-auto">
            <p id="bubbleText" class="text-sm font-black text-gray-700 italic text-center">Мына фон қандай әдемі, иә? Есепті де солай әдемі шығар! ✨</p>
            <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-5 h-5 bg-white border-b-2 border-r-2 border-blue-100 rotate-45"></div>
        </div>
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Lucky&backgroundColor=b6e3f4" alt="Robot" class="w-28 h-28 mx-auto mt-3 drop-shadow-2xl">
    </div>

    <div class="main-card w-full max-w-2xl p-10 border-t-8 border-t-blue-500">
        <h2 id="title" class="text-3xl font-black text-gray-800 mb-2 text-center uppercase tracking-tighter italic">Санды екі еселе</h2>
        <p id="desc" class="text-gray-500 mb-8 text-center text-lg font-bold bg-blue-50/80 py-3 rounded-2xl border-2 border-dashed border-blue-200">n санын 2-ге көбейтетін функция жаз.</p>

        <div class="relative group">
            <textarea id="code" class="code-area w-full h-36 p-5 text-xl focus:ring-4 focus:ring-blue-400/40 outline-none mb-8 transition-all shadow-2xl" spellcheck="false">function task(n) {
  return 
}</textarea>
            <div class="absolute top-2 right-4 text-[10px] text-blue-400/50 font-mono font-bold tracking-widest uppercase">JS Editor</div>
        </div>

        <button onclick="evaluateTask()" class="btn-primary w-full text-white text-2xl font-black py-6 rounded-3xl tracking-[0.2em] uppercase shadow-2xl hover:scale-[1.02]">
            ТЕКСЕРУ
        </button>
    </div>

    <script>
        function startLesson() {
            const preview = document.getElementById('previewScreen');
            preview.style.transform = 'translateY(-100%) scale(0.9)';
            preview.style.opacity = '0';
            setTimeout(() => { preview.style.display = 'none'; }, 700);
        }

        const levels = [
            { t: "Санды екі еселе", d: "n санын 2-ге көбейт.", check: (f)=>f(5)===10, msg: "Керемет! Фондағы код сияқты нақты жаздың!" },
            { t: "Бөлуді үйрен", d: "n санын 2-ге бөл.", check: (f)=>f(10)===5, msg: "Өте жақсы! Математика — сенің досың!" },
            { t: "Сәлемдесу", d: "Сөзге '!' қосып қайтар.", check: (f)=>f("Сәлем")==="Сәлем!", msg: "Жарайсың! Сабақ 100% аяқталды!" }
        ];

        let cur = 0;
        let points = 0;

        function evaluateTask() {
            try {
                const userCode = document.getElementById('code').value;
                const fn = new Function('n', userCode + "\n return task(n);");
                if(levels[cur].check(fn)) {
                    confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 }, colors: ['#34d399', '#3b82f6', '#facc15'] });
                    points += 100;
                    document.getElementById('score').innerText = points + " упай";
                    document.getElementById('bubbleText').innerText = levels[cur].msg;
                    cur++;
                    if(cur < levels.length) setTimeout(nextLevel, 2000);
                    else finish();
                } else {
                    document.getElementById('bubbleText').innerText = "Ой, қате кетті! Қайтадан байқап көрші? 🤔";
                }
            } catch(e) {
                document.getElementById('bubbleText').innerText = "Кодта техникалық қате бар! 🛠️";
            }
        }

        function nextLevel() {
            document.getElementById('title').innerText = levels[cur].t;
            document.getElementById('desc').innerText = levels[cur].d;
            document.getElementById('levelTag').innerText = (cur+1) + "-деңгей";
            document.getElementById('progBar').style.width = (cur / levels.length * 100) + "%";
            document.getElementById('code').value = "function task(n) {\n  return \n}";
        }

        function finish() {
            document.querySelector('.main-card').innerHTML = `
                <div class="text-center py-10">
                    <div class="text-7xl mb-6">🏆</div>
                    <h2 class="text-5xl font-black text-green-500 mb-4 tracking-tighter italic uppercase">Жеңіс!</h2>
                    <p class="text-2xl text-gray-600 font-bold mb-8">Сен барлық кедергілерден өтіп, 300 упай жинадың!</p>
                    <button onclick="location.reload()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl uppercase">Қайталау</button>
                </div>
            `;
            document.getElementById('progBar').style.width = "100%";
        }
    </script>
</body>
</html>
